<!DOCTYPE html>
<html>
<body>
<h2>Live Fraud Alerts</h2>
<ul id="alerts"></ul>

<script>
const ws = new WebSocket("ws://localhost:8000/ws/fraud");

ws.onmessage = (event) => {
    const alert = JSON.parse(event.data);
    const li = document.createElement("li");
    li.textContent = `Alert ${alert.alert_id}: Customer ${alert.customer_id}, Amount ${alert.amount}, Risk ${alert.risk_score}`;
    document.getElementById("alerts").prepend(li);
};
</script>
</body>
</html>
